name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Validate versions, tag and updater key
        id: version
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(node -p "require('./package.json').version")
          tauri_version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          cargo_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' src-tauri/Cargo.toml | head -1)
          test "$package_version" = "$tauri_version"
          test "$package_version" = "$cargo_version"
          node -e "if (!/^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$/.test(process.argv[1])) process.exit(1)" "$package_version"
          git fetch --no-tags origin main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
            echo 'Releases must be built from the current origin/main commit.' >&2
            exit 1
          }
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            test "$GITHUB_REF_NAME" = "v$package_version"
            publish=true
            tag="$GITHUB_REF_NAME"
          else
            publish=false
            tag="v$package_version"
          fi
          if grep -q 'REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY' src-tauri/tauri.conf.json; then
            echo 'Updater public key is still a placeholder.' >&2
            exit 1
          fi
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: ./scripts/check-no-secrets.sh
      - run: ./scripts/check-workflows.sh

      - name: Validate release secrets exist
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          test -n "$SIGNING_KEY" || { echo 'TAURI_SIGNING_PRIVATE_KEY is not configured.' >&2; exit 1; }
          test -n "$SIGNING_PASSWORD" || { echo 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not configured.' >&2; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - run: npm run test:run
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    name: Build (${{ matrix.name }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            id: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
            paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - name: macOS x64
            id: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - name: Windows x64
            id: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          - name: Linux x64
            id: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ matrix.target }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - run: npm ci
      - name: Build signed updater artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.id }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish public release
    if: needs.validate.outputs.publish == 'true'
    needs: [validate, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: raw-assets
      - name: Normalize and validate release assets
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: ./scripts/prepare-release-assets.sh "$RELEASE_VERSION" "$RELEASE_TAG" raw-assets release-assets
      - name: Publish to public binary repository
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo tyrival/Hummingbird-Releases >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite it." >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo tyrival/Hummingbird-Releases \
            --target main \
            --title "Hummingbird $RELEASE_VERSION" \
            --generate-notes \
            --latest

  verify-only:
    name: Verify manual build artifacts
    if: needs.validate.outputs.publish != 'true'
    needs: [validate, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: raw-assets
      - name: Normalize and validate without publishing
        run: ./scripts/prepare-release-assets.sh '${{ needs.validate.outputs.version }}' '${{ needs.validate.outputs.tag }}' raw-assets release-assets
      - uses: actions/upload-artifact@v4
        with:
          name: verified-release-${{ needs.validate.outputs.version }}
          path: release-assets
          if-no-files-found: error
          retention-days: 7
